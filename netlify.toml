[build]
  command = "pip install -r requirements.txt && python generate_dashboard.py"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 200

[[headers]]
  for = "/dashboard.html"
  [headers.values]
    Cache-Control = "no-cache"
